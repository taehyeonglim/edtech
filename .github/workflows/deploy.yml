name: Deploy edtech site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material
      - name: Build MkDocs (교재)
        run: mkdocs build --strict
      - name: Assemble site tree
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html
          [ -f .nojekyll ] && cp .nojekyll _site/.nojekyll || touch _site/.nojekyll
          cp -r chapters _site/chapters
          cp -r site _site/book
          [ -d assets ] && cp -r assets _site/assets || true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
